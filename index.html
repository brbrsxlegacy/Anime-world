<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad Lands - Starter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background: #87ceeb; }
    #app { position: relative; width: 100%; height: 100%; }
    #bg {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, #9ad8ff 0%, #c9ecff 35%, #dff5ff 55%, #a6d47a 56%, #7fb35c 100%);
    }
    #scene { position: absolute; inset: 0; }

    .hud {
      position: absolute; inset: 0; pointer-events: none;
      display: grid; grid-template-columns: 260px 1fr 280px;
      padding: 20px;
      gap: 20px;
    }

    .panel {
      pointer-events: auto;
      background: rgba(15, 23, 42, 0.74);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      color: white;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .left-panel {
      padding: 18px;
      align-self: center;
    }

    .left-panel h2, .right-panel h2 { font-size: 28px; margin-bottom: 16px; }
    .power-item {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .power-item:hover, .power-item.active {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
    }
    .power-item h3 { font-size: 18px; margin-bottom: 6px; }
    .power-item p { font-size: 13px; opacity: 0.85; }

    .center-ui {
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      padding: 20px 0;
    }
    .logo {
      margin-top: 8px;
      text-align: center;
      color: white;
      text-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .logo h1 { font-size: 64px; letter-spacing: 2px; }
    .logo p { font-size: 18px; opacity: 0.9; }

    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      pointer-events: auto;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      border: none;
      background: rgba(255,255,255,0.92);
      color: #0f172a;
      padding: 14px 22px;
      border-radius: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.15);
      transition: 0.18s ease;
    }
    .btn:hover { transform: translateY(-2px) scale(1.02); }
    .btn.primary { background: linear-gradient(135deg, #ff884d, #ff5d5d); color: white; }

    .right-panel {
      padding: 18px;
      align-self: center;
    }
    .stat {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
    }
    .mini-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .mini-btn {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
    }

    .toast {
      position: absolute;
      left: 50%; bottom: 26px;
      transform: translateX(-50%);
      background: rgba(15,23,42,0.82);
      color: white;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      opacity: 0;
      transition: 0.25s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 1100px) {
      .hud { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
      .left-panel, .right-panel { width: min(100%, 520px); justify-self: center; }
      .logo h1 { font-size: 42px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="bg"></div>
    <div id="scene"></div>

    <div class="hud">
      <div class="panel left-panel">
        <h2>Powers</h2>
        <div class="power-item active" data-power="fire">
          <h3>Alev Atışı</h3>
          <p>Havalı ateş patlamaları. Başlangıç gücü.</p>
        </div>
        <div class="power-item" data-power="laser">
          <h3>Göz Lazeri</h3>
          <p>Tek gözden düz ve güçlü lazer vurur.</p>
        </div>
        <div class="power-item" data-power="water">
          <h3>Su Atışı</h3>
          <p>Seri ve akışkan vuruş efekti verir.</p>
        </div>
      </div>

      <div class="center-ui">
        <div class="logo">
          <h1>BAD LANDS</h1>
          <p>Online boss fight başlangıç ekranı</p>
        </div>

        <div class="buttons">
          <button class="btn primary" id="playBtn">Play</button>
          <button class="btn" id="shopBtn">Shop</button>
          <button class="btn" id="jacketBtn">Ceket</button>
          <button class="btn" id="soundBtn">Ses: Açık</button>
        </div>
      </div>

      <div class="panel right-panel">
        <h2>Karakter</h2>
        <div class="stat"><span>Seviye</span><strong id="levelText">1</strong></div>
        <div class="stat"><span>Güç</span><strong id="powerText">Alev</strong></div>
        <div class="stat"><span>Ceket</span><strong id="jacketText">Kapalı</strong></div>
        <div class="stat"><span>Coin</span><strong>250</strong></div>
        <div class="mini-btns">
          <button class="mini-btn" id="upgradeBtn">Upgrade</button>
          <button class="mini-btn" id="skinBtn">Skin</button>
          <button class="mini-btn" id="settingsBtn">Settings</button>
          <button class="mini-btn" id="fxBtn">FX Test</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">Hazır</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const sceneWrap = document.getElementById('scene');
    const toast = document.getElementById('toast');
    const levelText = document.getElementById('levelText');
    const powerText = document.getElementById('powerText');
    const jacketText = document.getElementById('jacketText');

    let soundOn = true;
    let jacketOn = false;
    let currentPower = 'fire';
    let level = 1;

    const powerNames = {
      fire: 'Alev',
      laser: 'Lazer',
      water: 'Su'
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    sceneWrap.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xbfeaff, 18, 45);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4.5, 10);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x7db15c, 1.2);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.15);
    dir.position.set(6, 10, 5);
    dir.castShadow = true;
    scene.add(dir);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(18, 64),
      new THREE.MeshStandardMaterial({ color: 0x75b65d, roughness: 0.95 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const arenaRing = new THREE.Mesh(
      new THREE.TorusGeometry(5.2, 0.18, 18, 100),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x88ccff, emissiveIntensity: 0.35 })
    );
    arenaRing.rotation.x = Math.PI / 2;
    arenaRing.position.y = 0.05;
    scene.add(arenaRing);

    const cloudGroup = new THREE.Group();
    for (let i = 0; i < 8; i++) {
      const cloud = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
      for (let j = 0; j < 4; j++) {
        const puff = new THREE.Mesh(new THREE.SphereGeometry(0.7 + Math.random() * 0.5, 20, 20), mat);
        puff.position.set(j * 0.7, Math.random() * 0.2, Math.random() * 0.4);
        cloud.add(puff);
      }
      cloud.position.set((Math.random() - 0.5) * 22, 6 + Math.random() * 3, -8 - Math.random() * 10);
      cloud.userData.speed = 0.002 + Math.random() * 0.003;
      cloudGroup.add(cloud);
    }
    scene.add(cloudGroup);

    const character = new THREE.Group();
    scene.add(character);

    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe8eefc, roughness: 0.6 });
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x4466ff, emissiveIntensity: 0.2 });
    const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const limbMat = new THREE.MeshStandardMaterial({ color: 0x2f3640, roughness: 0.8 });
    const jacketMat = new THREE.MeshStandardMaterial({ color: 0x203a5f, roughness: 0.7 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(2.3, 3.6, 1.4), bodyMat);
    body.position.y = 2.5;
    body.castShadow = true;
    character.add(body);

    const eye = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 0.34, 32), eyeMat);
    eye.rotation.x = Math.PI / 2;
    eye.position.set(0, 2.65, 0.89);
    eye.castShadow = true;
    character.add(eye);

    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.16, 24, 24), blackMat);
    pupil.position.set(0, 2.65, 1.06);
    character.add(pupil);

    const smile = new THREE.Mesh(
      new THREE.TorusGeometry(0.5, 0.05, 10, 40, Math.PI),
      blackMat
    );
    smile.position.set(0, 1.8, 0.73);
    smile.rotation.z = Math.PI;
    character.add(smile);

    function makeLimb(x, y, rot = 0) {
      const limb = new THREE.Mesh(new THREE.CapsuleGeometry(0.13, 1.6, 6, 14), limbMat);
      limb.position.set(x, y, 0);
      limb.rotation.z = rot;
      limb.castShadow = true;
      return limb;
    }

    const leftArm = makeLimb(-1.45, 2.25, 0.08);
    const rightArm = makeLimb(1.45, 2.25, -0.08);
    const leftLeg = makeLimb(-0.45, 0.75, 0.02);
    const rightLeg = makeLimb(0.45, 0.75, -0.02);
    character.add(leftArm, rightArm, leftLeg, rightLeg);

    const jacket = new THREE.Group();
    const jacketBody = new THREE.Mesh(new THREE.BoxGeometry(2.45, 2.55, 1.5), jacketMat);
    jacketBody.position.set(0, 2.25, 0);
    const stripeMat = new THREE.MeshStandardMaterial({ color: 0x79c2ff, emissive: 0x244bff, emissiveIntensity: 0.4 });
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.28, 2.4, 1.52), stripeMat);
    stripe.position.set(0, 2.25, 0.01);
    jacket.add(jacketBody, stripe);
    jacket.visible = false;
    character.add(jacket);

    const powerGroup = new THREE.Group();
    scene.add(powerGroup);

    function clearPowers() {
      while (powerGroup.children.length) {
        const child = powerGroup.children.pop();
        child.geometry?.dispose?.();
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose?.());
        else child.material?.dispose?.();
      }
    }

    function spawnFire() {
      clearPowers();
      for (let i = 0; i < 14; i++) {
        const orb = new THREE.Mesh(
          new THREE.SphereGeometry(0.08 + Math.random() * 0.14, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0xff6a00, emissive: 0xff3300, emissiveIntensity: 1.5 })
        );
        orb.position.set((Math.random() - 0.5) * 0.35, 2.68 + (Math.random() - 0.5) * 0.25, 1.2 + Math.random() * 0.8);
        orb.userData = { baseZ: orb.position.z, speed: 0.015 + Math.random() * 0.025, kind: 'fire' };
        powerGroup.add(orb);
      }
    }

    function spawnLaser() {
      clearPowers();
      const beam = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1, 0.17, 4.8, 18),
        new THREE.MeshStandardMaterial({ color: 0x7fe7ff, emissive: 0x29c7ff, emissiveIntensity: 2.2, transparent: true, opacity: 0.88 })
      );
      beam.rotation.x = Math.PI / 2;
      beam.position.set(0, 2.65, 3.2);
      beam.userData = { kind: 'laser' };
      powerGroup.add(beam);

      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 20, 20),
        new THREE.MeshStandardMaterial({ color: 0xc8ffff, emissive: 0x74eaff, emissiveIntensity: 2 })
      );
      glow.position.set(0, 2.65, 1.18);
      glow.userData = { kind: 'laserGlow' };
      powerGroup.add(glow);
    }

    function spawnWater() {
      clearPowers();
      for (let i = 0; i < 18; i++) {
        const drop = new THREE.Mesh(
          new THREE.SphereGeometry(0.06 + Math.random() * 0.08, 12, 12),
          new THREE.MeshStandardMaterial({ color: 0x57c7ff, emissive: 0x1f74ff, emissiveIntensity: 1.15, transparent: true, opacity: 0.82 })
        );
        drop.position.set((Math.random() - 0.5) * 0.45, 2.62 + (Math.random() - 0.5) * 0.3, 1 + Math.random() * 1.1);
        drop.userData = { angle: Math.random() * Math.PI * 2, radius: 0.35 + Math.random() * 0.55, kind: 'water', y: drop.position.y };
        powerGroup.add(drop);
      }
    }

    function setPower(type) {
      currentPower = type;
      powerText.textContent = powerNames[type];
      document.querySelectorAll('.power-item').forEach(item => {
        item.classList.toggle('active', item.dataset.power === type);
      });
      if (type === 'fire') spawnFire();
      if (type === 'laser') spawnLaser();
      if (type === 'water') spawnWater();
      showToast(powerNames[type] + ' seçildi');
      playBeep(type === 'fire' ? 220 : type === 'laser' ? 440 : 330, 0.09);
    }

    function toggleJacket() {
      jacketOn = !jacketOn;
      jacket.visible = jacketOn;
      jacketText.textContent = jacketOn ? 'Açık' : 'Kapalı';
      showToast(jacketOn ? 'Ceket giydirildi' : 'Ceket çıkarıldı');
      playBeep(jacketOn ? 280 : 180, 0.08);
    }

    function levelUp() {
      level++;
      levelText.textContent = String(level);
      showToast('Seviye arttı: ' + level);
      playBeep(520, 0.12);
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 1400);
    }

    function playBeep(freq = 260, duration = 0.1) {
      if (!soundOn) return;
      const audioCtx = playBeep.ctx || (playBeep.ctx = new (window.AudioContext || window.webkitAudioContext)());
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      gain.gain.value = 0.02;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.stop(audioCtx.currentTime + duration);
    }

    document.querySelectorAll('.power-item').forEach(item => {
      item.addEventListener('click', () => setPower(item.dataset.power));
    });

    document.getElementById('jacketBtn').addEventListener('click', toggleJacket);
    document.getElementById('upgradeBtn').addEventListener('click', levelUp);
    document.getElementById('playBtn').addEventListener('click', () => {
      showToast('Boss arena sonra bağlanacak');
      playBeep(600, 0.12);
    });
    document.getElementById('shopBtn').addEventListener('click', () => showToast('Market sistemi sonraki adımda')); 
    document.getElementById('skinBtn').addEventListener('click', () => showToast('Skin ekranı sonraki adımda')); 
    document.getElementById('settingsBtn').addEventListener('click', () => showToast('Ayarlar sonra')); 
    document.getElementById('fxBtn').addEventListener('click', () => {
      setPower(currentPower);
      showToast('Efekt testi');
    });
    document.getElementById('soundBtn').addEventListener('click', (e) => {
      soundOn = !soundOn;
      e.target.textContent = 'Ses: ' + (soundOn ? 'Açık' : 'Kapalı');
      showToast(soundOn ? 'Ses açıldı' : 'Ses kapandı');
    });

    setPower('fire');

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      character.position.y = Math.sin(t * 1.6) * 0.08;
      character.rotation.y = Math.sin(t * 0.8) * 0.25;
      leftArm.rotation.z = 0.18 + Math.sin(t * 2) * 0.16;
      rightArm.rotation.z = -0.18 - Math.sin(t * 2) * 0.16;
      leftLeg.rotation.z = Math.sin(t * 2) * 0.05;
      rightLeg.rotation.z = -Math.sin(t * 2) * 0.05;
      pupil.position.x = Math.sin(t * 1.3) * 0.08;

      arenaRing.rotation.z += 0.004;

      cloudGroup.children.forEach(cloud => {
        cloud.position.x += cloud.userData.speed;
        if (cloud.position.x > 13) cloud.position.x = -13;
      });

      powerGroup.children.forEach((obj, i) => {
        if (obj.userData.kind === 'fire') {
          obj.position.z += obj.userData.speed;
          obj.position.x += Math.sin(t * 5 + i) * 0.004;
          if (obj.position.z > 4.6) obj.position.z = obj.userData.baseZ;
        }
        if (obj.userData.kind === 'laser') {
          obj.scale.x = 1 + Math.sin(t * 18) * 0.05;
          obj.scale.y = 1 + Math.sin(t * 18) * 0.08;
        }
        if (obj.userData.kind === 'laserGlow') {
          obj.scale.setScalar(1 + Math.sin(t * 10) * 0.18);
        }
        if (obj.userData.kind === 'water') {
          obj.position.x = Math.cos(t * 3 + obj.userData.angle) * obj.userData.radius * 0.7;
          obj.position.y = obj.userData.y + Math.sin(t * 4 + obj.userData.angle) * 0.15;
          obj.position.z = 1.4 + Math.sin(t * 3 + obj.userData.angle) * 0.6;
        }
      });

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
