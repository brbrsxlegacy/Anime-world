<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sky Ruins: Eye of Chaos</title>
  <style>
    :root{
      --ui: rgba(10,18,30,.38);
      --line: rgba(255,255,255,.16);
      --text: #eef7ff;
      --accent: #69eaff;
      --accent2: #ff9b5e;
      --danger: #ff5a70;
      --ok: #7dffb2;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:linear-gradient(180deg,#bfe9ff,#7ccfff 45%,#dff7ff)}
    canvas{display:block}
    .hud{position:fixed;inset:0;pointer-events:none;color:var(--text)}
    .top{position:absolute;left:10px;right:10px;top:10px;display:flex;gap:10px;justify-content:space-between;align-items:flex-start}
    .panel{background:var(--ui);border:1px solid var(--line);backdrop-filter:blur(12px);border-radius:18px;padding:10px 12px;box-shadow:0 12px 34px rgba(0,0,0,.18)}
    .left{min-width:220px}
    .center{min-width:min(52vw,700px);text-align:center}
    .title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.84;font-weight:700;margin-bottom:6px}
    .big{font-size:21px;font-weight:900}
    .small{font-size:12px;opacity:.9;margin-top:4px}
    .bar{width:100%;height:15px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);margin-top:7px}
    .fill{height:100%;width:100%}
    .hp{background:linear-gradient(90deg,#4fe7ff,#b0fff6)}
    .boss{background:linear-gradient(90deg,#ff6a6a,#ffbd59)}
    .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-top:6px}
    .bossPanel{display:none}
    .bossPanel.show{display:block}
    .msg{position:absolute;left:50%;transform:translateX(-50%);top:96px;padding:10px 16px;border-radius:16px;background:rgba(8,16,26,.42);border:1px solid rgba(255,255,255,.12);font-weight:700;opacity:0;transition:.25s;max-width:80vw;text-align:center}
    .msg.show{opacity:1}
    .controls{position:absolute;left:0;right:0;bottom:0;padding:14px;display:flex;justify-content:space-between;align-items:end;pointer-events:none}
    .stickWrap{width:160px;height:160px;position:relative;pointer-events:auto}
    .stickBase,.stickKnob{position:absolute;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(10px)}
    .stickBase{left:0;bottom:0;width:140px;height:140px}
    .stickKnob{left:36px;bottom:36px;width:68px;height:68px;box-shadow:0 8px 22px rgba(0,0,0,.18)}
    .btns{display:grid;grid-template-columns:repeat(2,82px);grid-template-rows:repeat(2,82px);gap:10px;pointer-events:auto}
    .btn{display:flex;align-items:center;justify-content:center;border-radius:22px;background:rgba(10,18,30,.44);border:1px solid rgba(255,255,255,.16);color:#fff;font-weight:900;font-size:15px;box-shadow:0 10px 26px rgba(0,0,0,.18);pointer-events:auto}
    .btn:active{transform:scale(.96)}
    .desktopHint{position:absolute;left:50%;transform:translateX(-50%);bottom:12px;padding:8px 12px;border-radius:12px;background:rgba(8,16,26,.28);font-size:12px;border:1px solid rgba(255,255,255,.08)}
    @media (min-width: 900px){ .controls{padding:20px} }
  </style>
</head>
<body>
  <div class="hud">
    <div class="top">
      <div class="panel left">
        <div class="title">Oyuncu</div>
        <div class="big">Sky Ruins Runner</div>
        <div class="bar"><div id="playerHP" class="fill hp"></div></div>
        <div class="row"><span>Can</span><span id="hpText">100 / 100</span></div>
        <div class="row"><span>Kristal</span><span id="gemText">0</span></div>
        <div class="row"><span>Bölge</span><span id="zoneText">Platform Vadisi</span></div>
      </div>
      <div id="bossUI" class="panel center bossPanel">
        <div class="title">Boss Fight</div>
        <div class="big">Eye of Chaos</div>
        <div class="bar"><div id="bossHP" class="fill boss"></div></div>
        <div class="small" id="bossText">Dev tek gözlü titan uyandı</div>
      </div>
    </div>
    <div id="msg" class="msg">Sky Ruins'e hoş geldin</div>
    <div class="controls">
      <div class="stickWrap" id="stickWrap">
        <div class="stickBase"></div>
        <div class="stickKnob" id="stickKnob"></div>
      </div>
      <div class="btns">
        <div class="btn" id="fireBtn">ATEŞ</div>
        <div class="btn" id="waterBtn">SU</div>
        <div class="btn" id="laserBtn">LAZER</div>
        <div class="btn" id="jumpBtn">ZIPLA</div>
      </div>
    </div>
    <div class="desktopHint">Bilgisayar: WASD hareket • Space zıpla • J/K/L skill</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xb8ecff, 35, 220);

    const camera = new THREE.PerspectiveCamera(68, innerWidth / innerHeight, 0.1, 600);
    const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 1.8));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xdff7ff, 0x7dc16a, 1.6);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 1.35);
    sun.position.set(50, 70, 25);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048,2048);
    sun.shadow.camera.left = -100;
    sun.shadow.camera.right = 100;
    sun.shadow.camera.top = 100;
    sun.shadow.camera.bottom = -100;
    scene.add(sun);

    const clock = new THREE.Clock();
    const worldGravity = -28;

    const ui = {
      playerHP: document.getElementById('playerHP'),
      hpText: document.getElementById('hpText'),
      bossUI: document.getElementById('bossUI'),
      bossHP: document.getElementById('bossHP'),
      bossText: document.getElementById('bossText'),
      gemText: document.getElementById('gemText'),
      zoneText: document.getElementById('zoneText'),
      msg: document.getElementById('msg'),
      stickWrap: document.getElementById('stickWrap'),
      stickKnob: document.getElementById('stickKnob')
    };

    function flashMessage(text, ms=1800){
      ui.msg.textContent = text;
      ui.msg.classList.add('show');
      clearTimeout(flashMessage.t);
      flashMessage.t = setTimeout(()=>ui.msg.classList.remove('show'), ms);
    }

    const keys = {};
    addEventListener('keydown', e=> keys[e.key.toLowerCase()] = true);
    addEventListener('keyup', e=> keys[e.key.toLowerCase()] = false);
    addEventListener('contextmenu', e=> e.preventDefault());

    const projectiles = [];
    const enemyProjectiles = [];
    const particles = [];
    const collectibles = [];
    const hazards = [];
    const platforms = [];
    const bosses = [];

    function addCloud(x,y,z,s=1){
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color:0xffffff, transparent:true, opacity:0.95 });
      for(let i=0;i<5;i++){
        const m = new THREE.Mesh(new THREE.SphereGeometry((2+Math.random()*1.6)*s, 18, 18), mat);
        m.position.set((i-2)*1.6*s + Math.random()*0.7, Math.random()*0.6*s, Math.random()*0.6*s);
        g.add(m);
      }
      g.position.set(x,y,z);
      scene.add(g);
      return g;
    }

    const clouds = [
      addCloud(-20, 18, -30, 1.2), addCloud(30, 22, -50, 1.5), addCloud(80, 20, -80, 1.1),
      addCloud(150, 25, -120, 1.7), addCloud(230, 19, -180, 1.4), addCloud(315, 23, -245, 1.3)
    ];

    const groundMat = new THREE.MeshStandardMaterial({ color:0x7fd067, roughness:0.95 });
    const dirtMat = new THREE.MeshStandardMaterial({ color:0x93613a, roughness:1 });
    const glowMat = new THREE.MeshStandardMaterial({ color:0x89f0ff, emissive:0x2fdfff, emissiveIntensity:0.6 });

    function makeIsland(x,z,w,d,h=4){
      const g = new THREE.Group();
      const top = new THREE.Mesh(new THREE.BoxGeometry(w,1,d), groundMat);
      top.castShadow = true; top.receiveShadow = true;
      const base = new THREE.Mesh(new THREE.BoxGeometry(w*0.92,h,d*0.92), dirtMat);
      base.position.y = -h/2 - 0.5;
      base.castShadow = true; base.receiveShadow = true;
      g.add(top, base);
      g.position.set(x,0,z);
      scene.add(g);
      platforms.push({ minX:x-w/2, maxX:x+w/2, minZ:z-d/2, maxZ:z+d/2, y:0.5, kind:'floor' });
      return g;
    }

    makeIsland(0,0,34,24,4);
    makeIsland(45,-10,26,18,5);
    makeIsland(88,-22,24,18,5);
    makeIsland(128,-40,22,16,6);
    makeIsland(170,-62,28,20,6);
    makeIsland(220,-98,30,22,7);
    makeIsland(275,-145,30,22,7);

    function addPlatform(x,y,z,w,d,color=0xdaf7ff, bounce=0){
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,1,d), new THREE.MeshStandardMaterial({ color, roughness:0.8 }));
      mesh.position.set(x,y,z);
      mesh.castShadow = true; mesh.receiveShadow = true;
      scene.add(mesh);
      platforms.push({ minX:x-w/2, maxX:x+w/2, minZ:z-d/2, maxZ:z+d/2, y:y+0.5, mesh, kind:'platform', bounce });
      return mesh;
    }

    addPlatform(18,3,-4,8,8,0xe9fdff);
    addPlatform(32,5,-9,7,7,0xe5fbff);
    addPlatform(50,7,-14,7,7,0xe5fbff);
    addPlatform(68,10,-18,8,8,0xe5fbff, 0.2);
    addPlatform(86,12,-22,8,8,0xe5fbff);
    addPlatform(104,14,-28,8,8,0xe5fbff);
    addPlatform(122,16,-35,8,8,0xe5fbff, 0.25);
    addPlatform(145,6,-52,10,10,0xffd8a6, 0.45);
    addPlatform(171,8,-64,12,12,0xe9fdff);
    addPlatform(195,11,-78,10,10,0xe9fdff);
    addPlatform(220,15,-96,11,11,0xe9fdff);
    addPlatform(246,18,-118,11,11,0xe9fdff);
    addPlatform(275,20,-144,12,12,0xffd8a6, 0.55);

    function addCrystal(x,y,z){
      const m = new THREE.Mesh(new THREE.OctahedronGeometry(1.1,0), glowMat.clone());
      m.position.set(x,y,z);
      m.castShadow = true;
      scene.add(m);
      collectibles.push(m);
    }
    [[18,5,-4],[32,7,-9],[50,9,-14],[68,12,-18],[86,14,-22],[104,16,-28],[122,18,-35],[145,8,-52],[171,10,-64],[220,17,-96],[275,22,-144]].forEach(v=>addCrystal(...v));

    function addHazardFire(x,y,z,r=1.5){
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r,r,0.7,20), new THREE.MeshStandardMaterial({ color:0xff6b2e, emissive:0xff5d1f, emissiveIntensity:0.75 }));
      mesh.position.set(x,y,z);
      mesh.castShadow = true;
      scene.add(mesh);
      hazards.push({ mesh, r, type:'fire' });
    }
    addHazardFire(152,0.36,-58,1.7);
    addHazardFire(229,0.36,-102,1.7);

    const portal = new THREE.Mesh(
      new THREE.TorusGeometry(4.5, 0.6, 16, 40),
      new THREE.MeshStandardMaterial({ color:0x7ef6ff, emissive:0x33dfff, emissiveIntensity:1.2 })
    );
    portal.position.set(305, 7, -170);
    portal.rotation.x = Math.PI/2.7;
    portal.castShadow = true;
    scene.add(portal);

    const player = {
      hp:100, maxHp:100, gems:0,
      group:new THREE.Group(), vel:new THREE.Vector3(), onGround:false,
      fireCD:0, waterCD:0, laserCD:0, inv:0, dead:false, spawn:new THREE.Vector3(0,4,0)
    };

    function createHero(){
      const bodyMat = new THREE.MeshStandardMaterial({ color:0x45dfff, roughness:0.55, metalness:0.1 });
      const darkMat = new THREE.MeshStandardMaterial({ color:0x12314a });
      const glowEyeMat = new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0x8ffbff, emissiveIntensity:0.8 });
      const pupilMat = new THREE.MeshStandardMaterial({ color:0x081018 });

      const body = new THREE.Mesh(new THREE.BoxGeometry(2.2,3.2,1.2), bodyMat);
      body.castShadow = true;
      player.group.add(body);

      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.82, 26, 26), glowEyeMat);
      eye.position.set(0,0.45,0.82);
      eye.castShadow = true;
      player.group.add(eye);

      const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.23, 20, 20), pupilMat);
      pupil.position.set(0,0.45,1.45);
      player.group.add(pupil);

      const brow = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.16,0.14), darkMat);
      brow.position.set(0,1.34,0.64);
      player.group.add(brow);

      const armGeo = new THREE.CapsuleGeometry(0.15, 2.2, 4, 8);
      const legGeo = new THREE.CapsuleGeometry(0.18, 2.0, 4, 8);
      const armL = new THREE.Mesh(armGeo, bodyMat), armR = new THREE.Mesh(armGeo, bodyMat);
      armL.position.set(-1.45,0,0); armR.position.set(1.45,0,0);
      armL.rotation.z = 0.25; armR.rotation.z = -0.25;
      const legL = new THREE.Mesh(legGeo, darkMat), legR = new THREE.Mesh(legGeo, darkMat);
      legL.position.set(-0.5,-2.55,0); legR.position.set(0.5,-2.55,0);
      [armL,armR,legL,legR].forEach(m=>{ m.castShadow = true; player.group.add(m); });

      player.group.position.copy(player.spawn);
      scene.add(player.group);
      player.eye = eye;
      player.pupil = pupil;
    }
    createHero();

    function createBoss(x,y,z){
      const boss = { hp:400, maxHp:400, group:new THREE.Group(), awake:false, phase:1, shootCD:1.5, meteorCD:5, hitFlash:0 };
      const bodyMat = new THREE.MeshStandardMaterial({ color:0xff8557, roughness:0.55, metalness:0.05, emissive:0x6f1400, emissiveIntensity:0.2 });
      const limbMat = new THREE.MeshStandardMaterial({ color:0x2c1a1a });
      const eyeMat = new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xfff4a8, emissiveIntensity:1 });
      const pupilMat = new THREE.MeshStandardMaterial({ color:0x050505, emissive:0xff3e00, emissiveIntensity:0.25 });

      const body = new THREE.Mesh(new THREE.BoxGeometry(9,12,4), bodyMat);
      body.castShadow = true; body.receiveShadow = true;
      boss.group.add(body);

      const eye = new THREE.Mesh(new THREE.SphereGeometry(2.6, 32, 32), eyeMat);
      eye.position.set(0,1.2,2.85); eye.castShadow = true;
      boss.group.add(eye);

      const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.82, 24, 24), pupilMat);
      pupil.position.set(0,1.2,4.86);
      boss.group.add(pupil);

      const topHornL = new THREE.Mesh(new THREE.ConeGeometry(0.45, 3, 10), limbMat);
      const topHornR = topHornL.clone();
      topHornL.position.set(-2.2, 7.2, 0); topHornR.position.set(2.2, 7.2, 0);
      topHornL.rotation.z = 0.32; topHornR.rotation.z = -0.32;
      boss.group.add(topHornL, topHornR);

      const armGeo = new THREE.CapsuleGeometry(0.35, 7, 5, 10);
      const legGeo = new THREE.CapsuleGeometry(0.45, 6.5, 5, 10);
      const armL = new THREE.Mesh(armGeo, limbMat), armR = new THREE.Mesh(armGeo, limbMat);
      armL.position.set(-5.2,0,0); armR.position.set(5.2,0,0);
      armL.rotation.z = 0.22; armR.rotation.z = -0.22;
      const legL = new THREE.Mesh(legGeo, limbMat), legR = new THREE.Mesh(legGeo, limbMat);
      legL.position.set(-1.8,-8.7,0); legR.position.set(1.8,-8.7,0);
      [armL,armR,legL,legR].forEach(m=>{ m.castShadow = true; boss.group.add(m); });

      boss.group.position.set(x,y,z);
      scene.add(boss.group);
      boss.eye = eye;
      boss.pupil = pupil;
      bosses.push(boss);
      return boss;
    }

    const boss = createBoss(315, 18, -205);

    function makeParticle(pos, color, size=0.22, life=0.6, vel=null){
      const m = new THREE.Mesh(new THREE.SphereGeometry(size, 8, 8), new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.8 }));
      m.position.copy(pos);
      scene.add(m);
      particles.push({ mesh:m, life, maxLife:life, vel: vel || new THREE.Vector3((Math.random()-.5)*6, Math.random()*5, (Math.random()-.5)*6) });
    }

    function burst(pos, color, count=16, size=0.22){
      for(let i=0;i<count;i++) makeParticle(pos, color, size, 0.45 + Math.random()*0.4);
    }

    const projectiles = [];
    const enemyProjectiles = [];
    const particles = [];

    function shoot(kind){
      if(player.dead) return;
      if(kind==='fire' && player.fireCD>0) return;
      if(kind==='water' && player.waterCD>0) return;
      if(kind==='laser' && player.laserCD>0) return;

      const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
      const origin = player.group.position.clone().add(new THREE.Vector3(0,1.1,0)).add(dir.clone().multiplyScalar(1.3));
      let color = 0xff6a2a, speed = 26, damage = 14, size = 0.32, life = 2.2;
      if(kind==='water'){ color = 0x4ab9ff; speed = 24; damage = 12; size = 0.34; life = 2.4; player.waterCD = 0.45; }
      if(kind==='fire'){ player.fireCD = 0.22; }
      if(kind==='laser'){ color = 0xff58ff; speed = 42; damage = 24; size = 0.22; life = 1.1; player.laserCD = 1.2; }

      const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 12, 12), new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 1 }));
      mesh.position.copy(origin);
      scene.add(mesh);
      projectiles.push({ mesh, vel: dir.multiplyScalar(speed), damage, life, kind, color });
      burst(origin, color, kind==='laser' ? 8 : 5, kind==='laser' ? 0.12 : 0.18);
    }

    function enemyShot(origin, target, kind='orb'){
      const dir = target.clone().sub(origin).normalize();
      let color = 0xff7a2d, speed = 12, damage = 10, size = 0.65;
      if(kind==='water'){ color = 0x64c8ff; damage = 8; speed = 10; }
      if(kind==='laser'){ color = 0xff59ff; damage = 16; speed = 22; size = 0.35; }
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 14, 14), new THREE.MeshStandardMaterial({ color, emissive:color, emissiveIntensity:1 }));
      mesh.position.copy(origin);
      scene.add(mesh);
      enemyProjectiles.push({ mesh, vel: dir.multiplyScalar(speed), damage, life: kind==='laser'?1.2:4.5, color, kind });
    }

    function damagePlayer(dmg){
      if(player.inv>0 || player.dead) return;
      player.hp = Math.max(0, player.hp - dmg);
      player.inv = 0.7;
      burst(player.group.position.clone().add(new THREE.Vector3(0,1.5,0)), 0xff4c6e, 14, 0.16);
      if(player.hp<=0){
        player.dead = true;
        flashMessage('Düştün. 2 saniye sonra yeniden başlıyor');
        setTimeout(()=>{
          player.hp = player.maxHp;
          player.dead = false;
          player.group.position.copy(player.spawn);
          player.vel.set(0,0,0);
          boss.hp = boss.maxHp;
          boss.phase = 1;
          boss.group.visible = true;
          boss.awake = false;
          ui.bossUI.classList.remove('show');
          ui.zoneText.textContent = 'Platform Vadisi';
          flashMessage('Tekrar dene');
        }, 2000);
      }
    }

    function damageBoss(dmg){
      if(boss.hp<=0) return;
      boss.hp = Math.max(0, boss.hp - dmg);
      boss.hitFlash = 0.12;
      burst(boss.pupil.getWorldPosition(new THREE.Vector3()), 0xffc14d, 10, 0.18);
      if(boss.hp <= boss.maxHp*0.5 && boss.phase===1){
        boss.phase = 2;
        flashMessage('Phase 2 başladı: Göz lazeri ve meteor yağmuru');
      }
      if(boss.hp<=0){
        boss.group.visible = false;
        flashMessage('Boss yenildi! Dünyayı kasıp kavurdun');
        for(let i=0;i<24;i++) makeParticle(portal.position.clone(), 0x7ef6ff, 0.28, 1 + Math.random());
      }
    }

    const moveInput = { x:0, y:0 };
    let activeStick = null;
    function updateStick(dx,dy){
      const len = Math.min(42, Math.hypot(dx,dy));
      const ang = Math.atan2(dy,dx);
      const px = Math.cos(ang)*len, py = Math.sin(ang)*len;
      ui.stickKnob.style.transform = `translate(${px}px, ${py}px)`;
      moveInput.x = px/42;
      moveInput.y = py/42;
    }
    function resetStick(){
      ui.stickKnob.style.transform = 'translate(0px,0px)';
      moveInput.x = 0; moveInput.y = 0;
    }
    ui.stickWrap.addEventListener('pointerdown', e=>{ activeStick = e.pointerId; const r = ui.stickWrap.getBoundingClientRect(); updateStick(e.clientX-(r.left+70), e.clientY-(r.top+70)); });
    addEventListener('pointermove', e=>{ if(e.pointerId!==activeStick) return; const r = ui.stickWrap.getBoundingClientRect(); updateStick(e.clientX-(r.left+70), e.clientY-(r.top+70)); });
    addEventListener('pointerup', e=>{ if(e.pointerId===activeStick){ activeStick=null; resetStick(); } });

    document.getElementById('fireBtn').addEventListener('pointerdown', ()=>shoot('fire'));
    document.getElementById('waterBtn').addEventListener('pointerdown', ()=>shoot('water'));
    document.getElementById('laserBtn').addEventListener('pointerdown', ()=>shoot('laser'));
    document.getElementById('jumpBtn').addEventListener('pointerdown', ()=>{ if(player.onGround) player.vel.y = 12; });

    function findGroundY(x,z){
      let best = -999;
      let hit = null;
      for(const p of platforms){
        if(x>=p.minX && x<=p.maxX && z>=p.minZ && z<=p.maxZ){
          if(p.y > best){ best = p.y; hit = p; }
        }
      }
      return hit;
    }

    const camTarget = new THREE.Vector3();

    function updatePlayer(dt){
      player.fireCD = Math.max(0, player.fireCD-dt);
      player.waterCD = Math.max(0, player.waterCD-dt);
      player.laserCD = Math.max(0, player.laserCD-dt);
      player.inv = Math.max(0, player.inv-dt);

      const mx = (keys['d']?1:0) - (keys['a']?1:0) + moveInput.x;
      const mz = (keys['s']?1:0) - (keys['w']?1:0) + moveInput.y;
      const input = new THREE.Vector3(mx, 0, mz);
      if(input.lengthSq()>1) input.normalize();

      const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); forward.y=0; forward.normalize();
      const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); right.y=0; right.normalize();
      const wish = right.multiplyScalar(input.x).add(forward.multiplyScalar(input.z));
      const speed = 12;
      if(wish.lengthSq()>0){
        wish.normalize();
        player.vel.x += (wish.x*speed - player.vel.x)*Math.min(1, dt*10);
        player.vel.z += (wish.z*speed - player.vel.z)*Math.min(1, dt*10);
        player.group.rotation.y = Math.atan2(wish.x, wish.z);
      } else {
        player.vel.x += (0-player.vel.x)*Math.min(1, dt*8);
        player.vel.z += (0-player.vel.z)*Math.min(1, dt*8);
      }

      if(keys[' '] && player.onGround) player.vel.y = 12;
      if(keys['j']) shoot('fire');
      if(keys['k']) shoot('water');
      if(keys['l']) shoot('laser');

      player.vel.y += worldGravity*dt;
      player.group.position.addScaledVector(player.vel, dt);

      const ground = findGroundY(player.group.position.x, player.group.position.z);
      player.onGround = false;
      if(ground && player.group.position.y <= ground.y + 2.65 && player.vel.y <= 0){
        player.group.position.y = ground.y + 2.65;
        if(ground.bounce>0 && Math.abs(player.vel.y)>3) player.vel.y = 10 + ground.bounce*8;
        else player.vel.y = 0;
        player.onGround = true;
      }

      if(player.group.position.y < -22) damagePlayer(999);

      camTarget.copy(player.group.position).add(new THREE.Vector3(0,4.4,9.5));
      camera.position.lerp(camTarget, 1 - Math.pow(0.001, dt));
      camera.lookAt(player.group.position.x, player.group.position.y+1.6, player.group.position.z-3.5);

      player.pupil.position.x = Math.sin(performance.now()*0.004)*0.06;
      player.pupil.position.y = 0.45 + Math.cos(performance.now()*0.003)*0.04;

      for(const h of hazards){
        h.mesh.rotation.y += dt*2.4;
        if(h.mesh.position.distanceTo(player.group.position) < h.r+0.7) damagePlayer(16*dt);
      }

      for(let i=collectibles.length-1;i>=0;i--){
        const c = collectibles[i];
        c.rotation.y += dt*2;
        c.position.y += Math.sin(performance.now()*0.004 + i)*0.007;
        if(c.position.distanceTo(player.group.position) < 2){
          player.gems += 1;
          burst(c.position.clone(), 0x7ef6ff, 10, 0.16);
          scene.remove(c);
          collectibles.splice(i,1);
        }
      }
    }

    function updateProjectiles(dt){
      for(let i=projectiles.length-1;i>=0;i--){
        const p = projectiles[i];
        p.life -= dt;
        p.mesh.position.addScaledVector(p.vel, dt);
        if(p.kind==='fire') p.vel.y += Math.sin(performance.now()*0.02 + i)*0.02;
        if(p.kind==='water') p.vel.y += Math.cos(performance.now()*0.02 + i)*0.015;
        if(p.kind==='laser' && Math.random()<0.5) makeParticle(p.mesh.position.clone(), p.color, 0.08, 0.2, new THREE.Vector3());
        if(boss.group.visible && p.mesh.position.distanceTo(boss.group.position.clone().add(new THREE.Vector3(0,1.2,3.4))) < 5.2){
          damageBoss(p.damage);
          scene.remove(p.mesh);
          projectiles.splice(i,1);
          continue;
        }
        if(p.life<=0){ scene.remove(p.mesh); projectiles.splice(i,1); }
      }

      for(let i=enemyProjectiles.length-1;i>=0;i--){
        const p = enemyProjectiles[i];
        p.life -= dt;
        p.mesh.position.addScaledVector(p.vel, dt);
        if(p.kind==='orb') p.vel.y += Math.sin(performance.now()*0.01+i)*0.01;
        if(p.mesh.position.distanceTo(player.group.position.clone().add(new THREE.Vector3(0,1.2,0))) < 1.4){
          damagePlayer(p.damage);
          burst(p.mesh.position.clone(), p.color, 10, 0.18);
          scene.remove(p.mesh);
          enemyProjectiles.splice(i,1);
          continue;
        }
        if(p.life<=0){ scene.remove(p.mesh); enemyProjectiles.splice(i,1); }
      }
    }

    function updateParticles(dt){
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];
        p.life -= dt;
        p.mesh.position.addScaledVector(p.vel, dt);
        p.vel.y += worldGravity*0.25*dt;
        p.mesh.scale.setScalar(Math.max(0.05, p.life/p.maxLife));
        if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); }
      }
    }

    function updateBoss(dt){
      if(!boss.group.visible) return;
      const dist = player.group.position.distanceTo(boss.group.position);
      if(dist < 40 && !boss.awake){
        boss.awake = true;
        ui.bossUI.classList.add('show');
        ui.zoneText.textContent = 'Kaos Tapınağı';
        flashMessage('Boss uyandı');
      }
      if(!boss.awake) return;

      boss.shootCD -= dt;
      boss.meteorCD -= dt;
      boss.group.lookAt(player.group.position.x, boss.group.position.y, player.group.position.z);
      boss.group.rotation.x = 0;
      boss.group.rotation.z = 0;
      boss.group.position.y = 18 + Math.sin(performance.now()*0.0018)*1.2;
      boss.pupil.position.x = THREE.MathUtils.clamp((player.group.position.x-boss.group.position.x)*0.03, -0.5, 0.5);
      boss.pupil.position.y = 1.2 + THREE.MathUtils.clamp((player.group.position.y-boss.group.position.y)*0.03, -0.35, 0.35);

      if(boss.hitFlash>0){
        boss.hitFlash -= dt;
        boss.eye.material.emissiveIntensity = 2.2;
      } else {
        boss.eye.material.emissiveIntensity = boss.phase===2 ? 1.6 : 1;
      }

      if(boss.phase===1){
        ui.bossText.textContent = 'Ateş ve su küreleri fırlatıyor';
        if(boss.shootCD<=0){
          const eyePos = boss.eye.getWorldPosition(new THREE.Vector3()).add(new THREE.Vector3(0,0,0.8));
          enemyShot(eyePos, player.group.position.clone().add(new THREE.Vector3(0,1.2,0)), Math.random()>0.5 ? 'orb' : 'water');
          boss.shootCD = 1.1;
        }
      } else {
        ui.bossText.textContent = 'Meteor yağmuru ve göz lazeri aktif';
        if(boss.shootCD<=0){
          const eyePos = boss.eye.getWorldPosition(new THREE.Vector3()).add(new THREE.Vector3(0,0,0.8));
          enemyShot(eyePos, player.group.position.clone().add(new THREE.Vector3(0,1.2,0)), Math.random()>0.5 ? 'laser' : 'orb');
          boss.shootCD = 0.7;
        }
        if(boss.meteorCD<=0){
          for(let i=0;i<5;i++){
            const x = player.group.position.x + (Math.random()-0.5)*14;
            const z = player.group.position.z + (Math.random()-0.5)*14;
            const meteor = new THREE.Mesh(new THREE.IcosahedronGeometry(1.1+Math.random()*0.5, 0), new THREE.MeshStandardMaterial({ color:0xff7b30, emissive:0xff5a1e, emissiveIntensity:1 }));
            meteor.position.set(x, 28 + Math.random()*8, z);
            meteor.castShadow = true;
            scene.add(meteor);
            enemyProjectiles.push({ mesh:meteor, vel:new THREE.Vector3((Math.random()-.5)*1.5, -18-Math.random()*5, (Math.random()-.5)*1.5), damage:18, life:3.5, color:0xff7b30, kind:'orb' });
          }
          boss.meteorCD = 4.2;
        }
      }
    }

    function updateWorld(dt){
      portal.rotation.z += dt;
      portal.material.emissiveIntensity = 1 + Math.sin(performance.now()*0.006)*0.28;
      clouds.forEach((c,i)=>{ c.position.x += dt*(1.5 + i*0.14); if(c.position.x>370) c.position.x = -40; });
      if(player.group.position.distanceTo(portal.position) < 6 && boss.hp<=0){
        flashMessage('Demo bitti. Sonraki adımda menü, bölüm seçme ve daha büyük boss yaparız', 2600);
      }
    }

    function updateUI(){
      ui.playerHP.style.width = `${(player.hp/player.maxHp)*100}%`;
      ui.hpText.textContent = `${Math.ceil(player.hp)} / ${player.maxHp}`;
      ui.gemText.textContent = player.gems;
      ui.bossHP.style.width = `${Math.max(0,(boss.hp/boss.maxHp)*100)}%`;
    }

    function animate(){
      requestAnimationFrame(animate);
      const dt = Math.min(0.033, clock.getDelta());
      updatePlayer(dt);
      updateProjectiles(dt);
      updateParticles(dt);
      updateBoss(dt);
      updateWorld(dt);
      updateUI();
      renderer.render(scene, camera);
    }

    addEventListener('resize', ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.8));
    });

    flashMessage('Açık hava macera + parkur + boss fight hazır');
    animate();
  </script>
</body>
</html>
